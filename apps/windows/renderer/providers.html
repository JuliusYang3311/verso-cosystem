<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Providers Management</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 20px;
    }

    .provider-card {
      background: #252525;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #333;
    }

    .provider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .provider-name {
      font-size: 18px;
      font-weight: 600;
    }

    .btn {
      padding: 8px 16px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-danger {
      background: #dc3545;
    }

    .btn-secondary {
      background: #6c757d;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
    }

    .form-group textarea {
      font-family: monospace;
      resize: vertical;
    }

    .models-list {
      margin-top: 12px;
    }

    .model-item {
      background: #1a1a1a;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .add-provider-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #0066cc;
      color: white;
      border: none;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 102, 204, 0.4);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #252525;
      border-radius: 12px;
      padding: 24px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid #333;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      color: #e0e0e0;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
    }

    .provider-option {
      background: #1a1a1a;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .provider-option:hover {
      border-color: #0066cc;
      background: #222;
    }

    .provider-option-label {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .provider-option-hint {
      font-size: 12px;
      color: #999;
    }

    .model-checkbox-group {
      margin-bottom: 20px;
    }

    .model-checkbox-group-title {
      font-weight: 600;
      margin-bottom: 12px;
      color: #0066cc;
    }

    .model-checkbox-item {
      display: flex;
      align-items: center;
      padding: 8px;
      margin-bottom: 8px;
      background: #1a1a1a;
      border-radius: 6px;
    }

    .model-checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 12px;
      cursor: pointer;
    }

    .model-checkbox-label {
      flex: 1;
      cursor: pointer;
    }

    .model-checkbox-info {
      font-size: 12px;
      color: #999;
      margin-left: 8px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1 style="margin-bottom: 24px;">Providers Management</h1>

  <div id="providers-container"></div>

  <button class="add-provider-btn" onclick="showProviderSelectionModal()">+</button>

  <!-- Provider Selection Modal -->
  <div id="provider-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">Select Provider Type</div>
        <button class="modal-close" onclick="closeProviderModal()">×</button>
      </div>
      <div id="provider-options"></div>
    </div>
  </div>

  <!-- Model Selection Modal -->
  <div id="model-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">Select Models</div>
        <button class="modal-close" onclick="closeModelModal()">×</button>
      </div>
      <div id="model-options"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModelModal()">Cancel</button>
        <button class="btn" onclick="confirmModelSelection()">Add Selected Models</button>
      </div>
    </div>
  </div>

  <script src="model-config.js"></script>
  <script src="providers.js"></script>
</body>
</html>
